services:

  db:
    image: postgres:16-alpine
    container_name: website-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: dok_admin
      POSTGRES_USER: dok
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dok -d dok_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID}
    container_name: website-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://dok:${DB_PASSWORD}@db:5432/dok_admin
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - app-net
      - shared-nginx
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

networks:
  app-net:
    name: website-app-net
  shared-nginx:
    name: shared-nginx
    external: true

volumes:
  pgdata:
